<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Recebido · Agência Command</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0A;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
.wrap{max-width:520px}
.icon{width:80px;height:80px;background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 32px}
h1{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;margin-bottom:16px;letter-spacing:-.02em}
p{font-size:18px;color:#8A8A8E;line-height:1.7;margin-bottom:36px}
a{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#3A7BFF,#5B4FFF);color:#fff;border-radius:100px;padding:14px 32px;font-size:15px;font-weight:500;text-decoration:none;transition:transform .2s}
a:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">✓</div>
  <h1>Briefing recebido.</h1>
  <p>Obrigado por dedicar seu tempo a este processo. Nossa equipe vai analisar tudo com atenção e entrar em contato em até 24h úteis com um diagnóstico personalizado.</p>
  <a href="index.html">Enviar novo briefing</a>
</div>
</body>
</html>
